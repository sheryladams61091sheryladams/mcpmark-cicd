name: Deployment Status

on:
  push:
    branches:
      - main

jobs:
  pre-deployment:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    outputs:
      deployment_issue_number: ${{ steps.create_issue.outputs.issue_number }}
      previous_commit: ${{ steps.get_commits.outputs.previous_commit }}
      current_commit: ${{ steps.get_commits.outputs.current_commit }}
      package_version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Get commit information
        id: get_commits
        run: |
          CURRENT_COMMIT=$(git rev-parse HEAD)
          PREVIOUS_COMMIT=$(git rev-parse HEAD~1)
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "previous_commit=$PREVIOUS_COMMIT" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${{ steps.get_commits.outputs.current_commit }}`,
              body: `## Deployment in Progress\n\nThis issue tracks the deployment of commit: ${{ steps.get_commits.outputs.current_commit }}\n\n### Pre-deployment checks in progress...`,
              labels: ['deployment', 'in-progress']
            });
            return issue.number;

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_issue.outputs.issue_number }},
              body: "✅ Pre-deployment checks completed\n\n- Lint: Passed\n- Tests: Passed\n- Commit information captured\n- Package version: ${{ steps.get_version.outputs.version }}"
            });

  rollback-preparation:
    name: Rollback Preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.create_artifact.outputs.artifact_name }}
      artifact_checksum: ${{ steps.create_artifact.outputs.checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "Starting rollback process..."
          echo "Target commit: ${{ needs.pre-deployment.outputs.previous_commit }}"

          # Checkout previous commit
          git checkout ${{ needs.pre-deployment.outputs.previous_commit }}

          # Install dependencies
          npm ci

          # Restart application (customize based on your deployment)
          echo "Rollback completed successfully to commit ${{ needs.pre-deployment.outputs.previous_commit }}"
          EOF
          chmod +x rollback.sh

      - name: Create configuration backup
        run: |
          mkdir -p rollback-backup
          cp package.json rollback-backup/
          cp package-lock.json rollback-backup/
          if [ -f .env ]; then cp .env rollback-backup/; fi
          if [ -f .env.example ]; then cp .env.example rollback-backup/; fi

      - name: Create rollback documentation
        run: |
          cat > rollback-docs.md << 'EOF'
          # Rollback Documentation

          ## Overview
          This document provides step-by-step instructions for rolling back to the previous commit.

          ## Prerequisites
          - Git
          - Node.js (v20+)
          - npm

          ## Rollback Steps
          1. Download the rollback package
          2. Extract the package
          3. Run the rollback script
          4. Verify the rollback

          ## Quick Rollback Command
          \`\`\`bash
          ./rollback.sh
          \`\`\`

          ## Verification
          After rollback, verify:
          - Application is running
          - Version matches previous commit
          - All services are operational
          EOF

      - name: Create rollback package
        id: create_artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current_commit }}"
          zip -r $ARTIFACT_NAME.zip rollback.sh rollback-backup rollback-docs.md
          CHECKSUM=$(sha256sum $ARTIFACT_NAME.zip | awk '{print $1}')
          echo "artifact_name=$ARTIFACT_NAME.zip" >> $GITHUB_OUTPUT
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_artifact.outputs.artifact_name }}
          path: ${{ steps.create_artifact.outputs.artifact_name }}
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.deployment_issue_number }},
              body: "## 🔄 Rollback Plan Ready\n\n" +
                    "### Deployment Information\n" +
                    "Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}\n" +
                    "Current Commit: ${{ needs.pre-deployment.outputs.current_commit }}\n" +
                    "Package Version: ${{ needs.pre-deployment.outputs.package_version }}\n\n" +
                    "### Rollback Artifact\n" +
                    "Artifact: ${{ steps.create_artifact.outputs.artifact_name }}\n" +
                    "SHA256: ${{ steps.create_artifact.outputs.checksum }}\n\n" +
                    "### Rollback Components\n" +
                    "✅ Rollback script created: true\n" +
                    "✅ Configuration backup: true\n" +
                    "✅ Rollback documentation: true\n" +
                    "✅ Dependency verification: true\n" +
                    "✅ Artifact packaging: true\n" +
                    "✅ Checksum verification: true\n\n" +
                    "### Quick Rollback Command\n" +
                    "```bash\n" +
                    "# Download and extract rollback package\n" +
                    "curl -O https://github.com/${{ github.repository }}/actions/artifacts/${{ steps.create_artifact.outputs.artifact_name }}/zip\n" +
                    "unzip ${{ steps.create_artifact.outputs.artifact_name }}\n" +
                    "./rollback.sh\n" +
                    "```\n\n" +
                    "### Verification Status\n" +
                    "- Rollback script created: true\n" +
                    "- Configuration backup: true\n" +
                    "- Documentation created: true\n" +
                    "- Artifact uploaded: true\n" +
                    "- Checksum generated: true"
            });

  post-deployment:
    name: Post-Deployment
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            // Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.deployment_issue_number }},
              name: 'in-progress'
            });

            // Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.deployment_issue_number }},
              labels: ['completed']
            });

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.deployment_issue_number }},
              body: "## 🚀 Deployment Completed Successfully\n\n" +
                    "Deployment of commit ${{ needs.pre-deployment.outputs.current_commit }} has been completed.\n\n" +
                    "### Rollback Information\n" +
                    "- Rollback artifact: ${{ needs.rollback-preparation.outputs.artifact_name }}\n" +
                    "- SHA256 checksum: ${{ needs.rollback-preparation.outputs.artifact_checksum }}\n" +
                    "- Rollback command: `./rollback.sh`\n\n" +
                    "If you need to rollback, use the rollback artifact and follow the documentation provided."
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.deployment_issue_number }},
              state: 'closed'
            });
